name: Zenji
options:
  bundleIdPrefix: app.zenji.ios
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: false

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    TARGETED_DEVICE_FAMILY: "1,2"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    ENABLE_PREVIEWS: YES
    # WP-10 scaffold must build+run on the Simulator with no Apple Developer
    # account. App Group entitlements are wired per-target below so WP-17
    # (real signing) only has to flip these back on — see ios/README.md.
    CODE_SIGN_STYLE: Automatic
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO
    CODE_SIGN_IDENTITY: ""
    DEVELOPMENT_TEAM: ""

targets:
  Zenji:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Zenji
      # WP-69: the versioned eval corpus lives with the tests (one source of
      # truth — the CI XCTest loads it from the test bundle), but the DEBUG
      # on-device eval screen (Zenji/Eval/EvalView) loads it from the app
      # bundle, so bundle just this one JSON as an app resource. The widget
      # target deliberately does NOT list it (no eval code in the widget).
      - path: ZenjiTests/Fixtures/eval-corpus.json
        buildPhase: resources
    info:
      path: Zenji/Info.plist
      properties:
        CFBundleDevelopmentRegion: nb
        CFBundleDisplayName: Zenji
        CFBundlePackageType: APPL
        LSRequiresIPhoneOS: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # WP-12: BGAppRefreshTask (BackgroundRefreshScheduler.swift) — both
        # keys are required by BGTaskScheduler regardless of how thin the
        # wrapper around it is.
        BGTaskSchedulerPermittedIdentifiers:
          - app.zenji.refresh
        UIBackgroundModes:
          - fetch
        # WP-19: the `zenji://` deep-link scheme the profile-share QR / link
        # opens (ProfileShareCodec). Custom scheme → no Associated-Domains
        # entitlement needed (free-account friendly).
        CFBundleURLTypes:
          - CFBundleURLName: app.zenji.ios.profile
            CFBundleURLSchemes:
              - zenji
    settings:
      base:
        PRODUCT_NAME: Zenji
        PRODUCT_BUNDLE_IDENTIFIER: app.zenji.ios
        CODE_SIGN_ENTITLEMENTS: Zenji/Zenji.entitlements
    dependencies:
      - target: ZenjiWidgetExtension
        embed: true

  ZenjiWidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: ZenjiWidget
      - path: Zenji/DesignTokens.swift
      # WP-14: the widget's own timeline logic (WidgetTimelineBuilder.swift,
      # no import WidgetKit — see that file's header) needs the Codable
      # models, the FeedCompiler predicates + AgendaFormat/EventBridge
      # (bundled in Feed/, see AgendaFormat.swift's header on why), and just
      # the READ half of Sync — CacheStore + SyncState + DataStore, NOT
      # SyncClient.swift/Checksum.swift, so the widget target has no
      # network-capable code at all (INGEN nettverk i widgeten, per brief).
      - path: Zenji/Models
      - path: Zenji/Feed
      - path: Zenji/Sync/CacheStore.swift
      - path: Zenji/Sync/SyncState.swift
      - path: Zenji/Sync/DataStore.swift
      - path: Zenji/Widget/WidgetTimelineBuilder.swift
    info:
      path: ZenjiWidget/Info.plist
      properties:
        CFBundleDevelopmentRegion: nb
        CFBundleDisplayName: Zenji
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_NAME: ZenjiWidget
        PRODUCT_BUNDLE_IDENTIFIER: app.zenji.ios.widget
        CODE_SIGN_ENTITLEMENTS: ZenjiWidget/ZenjiWidget.entitlements
        SKIP_INSTALL: YES

  # WP-11: standalone (hostless) logic-test bundle for the Codable models in
  # Zenji/Models — no TEST_HOST/BUNDLE_LOADER, since these are pure decoding
  # tests with no dependency on the app's UI/runtime. Compiles the Models
  # sources directly into the test bundle (same pattern the widget extension
  # already uses for DesignTokens.swift above) rather than linking the app
  # binary, so it needs no `@testable import`. WP-12 adds Zenji/Sync the same
  # way, for SyncClient/CacheStore/DataStore's own hostless tests; WP-13 adds
  # Zenji/Feed for the FeedCompiler predicate + golden-vector tests; WP-15
  # adds Zenji/Notifications for NotificationPlanner's own hostless tests
  # (a recording NotificationScheduling double — no real UNUserNotificationCenter
  # call, no OS permission prompt, in this bundle).
  ZenjiTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: ZenjiTests
      - path: Zenji/Models
      - path: Zenji/Sync
      - path: Zenji/Feed
      - path: Zenji/Notifications
      # WP-14: AgendaViewModel + its SwiftUI views (day-grouped agenda,
      # detail sheets) and the widget's pure timeline builder — compiled
      # directly into this hostless bundle, same "no @testable import"
      # pattern as Models/Sync/Feed above, so AgendaViewModelTests and
      # WidgetTimelineBuilderTests can drive them with no running app.
      # DesignTokens.swift is needed here too: Agenda's SwiftUI views
      # reference ZenjiTokens/.zenjiMono directly (same reason
      # ZenjiWidgetExtension already lists it explicitly, above).
      - path: Zenji/DesignTokens.swift
      # WP-14.2: the manual theme override enum (pure cycling/mapping logic,
      # unit-tested directly — no `@testable import`, same pattern as
      # DesignTokens.swift above).
      - path: Zenji/ThemeOverride.swift
      # WP-14.3: `.zenjiTapTarget()` / `ZenjiActionButtonStyle` — the shared
      # tap-target helpers Agenda/Assistant's views call; same "no @testable
      # import" pattern as DesignTokens.swift/ThemeOverride.swift above.
      - path: Zenji/Interaction.swift
      - path: Zenji/Agenda
      - path: Zenji/Widget
      # WP-16: the FM-lekegrind's sources — the pure pipeline (grounding, diff,
      # persistence, the mock parser) plus the FoundationModels-backed assistant
      # and its @Generable schema. Compiled directly into the hostless bundle
      # (same "no @testable import" pattern). FoundationModels is present in the
      # Simulator SDK so this compiles fine; the tests drive MockInterestAssistant
      # only (Apple Intelligence can't run in CI/Simulator — see AssistantView's
      # header and ios/README.md).
      - path: Zenji/Assistant
      # WP-48: the profile domain (ProfileStore/InterestProfile/merge/sync-model/
      # backend/coordinator/CloudKit, the share codec + QR + panel, ResetService,
      # the EffectiveInterests bridge, and the view model's profil-sync extension)
      # moved out of Assistant/ into its own Zenji/Profile — it had only landed in
      # Assistant/ because that folder was already wired in here. Same hostless
      # "no @testable import" pattern; app + ZenjiDeviceDev pick it up via
      # `path: Zenji`, the widget deliberately does NOT (no profile/personal-
      # context code in the widget). Zenji/Demo (LensDemoSeed/MemoryDemoSeed) is
      # just as deliberately NOT listed here nor in the widget target: the demo
      # seeds are app-only screenshot harnesses, and keeping them out of the
      # explicit source lists is what makes that quarantine structural.
      - path: Zenji/Profile
      # WP-30: personal-memory sources (facts/episodic/behaviour store over the
      # same ProfileSyncState, retrieval digest, distiller, spoiler shield, the
      # "Hva jeg vet om deg" page) — compiled directly into the hostless bundle,
      # same "no @testable import" pattern. The app + ZenjiDeviceDev targets pick
      # these up via `path: Zenji`; the widget deliberately does NOT (memory is
      # app-only — the widget has no network/personal-context code).
      - path: Zenji/Memory
      # WP-31: the first-run onboarding — pure gate/starter-pack logic + the
      # SwiftUI flow — compiled directly into the hostless bundle (same "no
      # @testable import" pattern). App + ZenjiDeviceDev pick these up via
      # `path: Zenji`; the widget deliberately does NOT (onboarding is app-only).
      - path: Zenji/Onboarding
      # WP-69: the FM-eval harness — the pure corpus/scorer/runner + the
      # DEBUG-only eval screen — compiled into the hostless bundle so
      # EvalCorpusTests can drive the SAME corpus through MockInterestAssistant
      # that the on-device screen drives through the real FoundationModels one
      # (same "no @testable import" pattern). App + ZenjiDeviceDev pick these up
      # via `path: Zenji`; the corpus JSON they bundle as a resource (above).
      - path: Zenji/Eval
      # WP-13: the SAME golden feed-vector fixtures the JS reference test
      # (tests/feed-vectors.test.js) replays — referenced directly at the repo
      # root, never copied, so the two runners can never drift. XcodeGen
      # resolves this relative to project.yml (ios/) and supports source paths
      # outside it; `buildPhase: resources` bundles the *.json (and the README/
      # DIVERGENCES docs) so FeedVectorTests can load them from the test bundle
      # at runtime. `type: folder` keeps the folder as a bundle subdirectory
      # ("feed-vectors") so the vector JSONs never collide with the WP-11
      # Fixtures JSONs already flattened into the bundle root.
      - path: ../tests/fixtures/feed-vectors
        buildPhase: resources
        type: folder
    resources:
      - path: ZenjiTests/Fixtures
    info:
      path: ZenjiTests/Info.plist
      properties:
        CFBundleDevelopmentRegion: nb
    settings:
      base:
        PRODUCT_NAME: ZenjiTests
        PRODUCT_BUNDLE_IDENTIFIER: app.zenji.ios.tests

  # WP-16: a device-flavoured build of the SAME app sources (path: Zenji — so it
  # includes Assistant/ and its on-device FoundationModels code) for running on
  # a PHYSICAL iPhone under a FREE personal Apple Developer team. It handles two
  # free-account constraints WITHOUT touching the Simulator setup:
  #   (a) App Groups are unavailable on a free team, so this target uses an EMPTY
  #       entitlements file (no com.apple.security.application-groups). CacheStore
  #       then falls back to its Application Support directory (its built-in
  #       fallback, see CacheStore.swift), and ProfileStore (WP-16) already uses
  #       Application Support unconditionally.
  #   (b) A previous device attempt failed with "Embedded binary is not signed
  #       with the same certificate as the parent app" — so this target does NOT
  #       depend on / embed ZenjiWidgetExtension. The widget stays Simulator-only
  #       until a paid account (WP-17).
  # The Simulator `Zenji` target + scheme and every existing test are unchanged;
  # this target is purely additive and lives in its own `ZenjiDeviceDev` scheme.
  ZenjiDeviceDev:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Zenji
        # This target's own Info.plist lives at ZenjiDeviceDev/Info.plist (below),
        # so XcodeGen would otherwise treat the app's Zenji/Info.plist as an
        # ordinary resource and copy it into the bundle — colliding with the
        # processed Info.plist ("Multiple commands produce …/Info.plist"). The
        # Simulator `Zenji` target doesn't hit this because its info.path IS
        # Zenji/Info.plist (auto-excluded). Exclude it explicitly here.
        excludes:
          - Info.plist
      # WP-69: the eval corpus as an app resource, so the DEBUG on-device eval
      # screen (Zenji/Eval/EvalView) can load it from Bundle.main on the
      # physical iPhone — this is the build the owner actually runs the eval on.
      - path: ZenjiTests/Fixtures/eval-corpus.json
        buildPhase: resources
    info:
      path: ZenjiDeviceDev/Info.plist
      properties:
        CFBundleDevelopmentRegion: nb
        CFBundleDisplayName: Zenji
        CFBundlePackageType: APPL
        LSRequiresIPhoneOS: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        BGTaskSchedulerPermittedIdentifiers:
          - app.zenji.refresh
        UIBackgroundModes:
          - fetch
        # WP-19: same `zenji://` deep-link scheme on the device build so a
        # scanned QR / share link imports (LocalOnly merge — no CloudKit needed).
        CFBundleURLTypes:
          - CFBundleURLName: app.zenji.ios.profile
            CFBundleURLSchemes:
              - zenji
    settings:
      base:
        # Distinct PRODUCT_NAME → distinct `ZenjiDeviceDev.app` output, so it
        # never collides with the Simulator `Zenji` target's `Zenji.app` (the new
        # build system flags a shared output path project-wide, even across
        # schemes). The home-screen name stays "Zenji" via CFBundleDisplayName
        # above; only the on-disk product bundle name differs.
        PRODUCT_NAME: ZenjiDeviceDev
        # Reuses the app's own bundle id (NOT a distinct one): the free personal
        # team already has a valid "iOS Team Provisioning Profile: app.zenji.ios"
        # covering this device, and a free account can't provision an unlimited
        # number of new App IDs — so the device build signs against the existing
        # profile. The Simulator `Zenji` target shares this id but never signs
        # (CODE_SIGNING_ALLOWED=NO), so the two don't collide at install time
        # (only one is ever installed per destination). Xcode may warn about the
        # shared id; that's expected and harmless here.
        PRODUCT_BUNDLE_IDENTIFIER: app.zenji.ios
        CODE_SIGN_ENTITLEMENTS: ZenjiDeviceDev/ZenjiDeviceDev.entitlements
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_ALLOWED: YES
        CODE_SIGNING_REQUIRED: YES
        CODE_SIGN_IDENTITY: "Apple Development"
        DEVELOPMENT_TEAM: "9LVCB72DT8"

schemes:
  Zenji:
    build:
      targets:
        Zenji: all
        ZenjiWidgetExtension: all
        ZenjiTests: [test]
    test:
      config: Debug
      targets:
        - ZenjiTests
    run:
      config: Debug
    archive:
      config: Release
  ZenjiWidgetExtension:
    build:
      targets:
        ZenjiWidgetExtension: all
    run:
      config: Debug
    archive:
      config: Release
  # WP-16: builds only the widget-free, App-Group-free device app (see the
  # ZenjiDeviceDev target above). Used for the physical-iPhone build/install.
  ZenjiDeviceDev:
    build:
      targets:
        ZenjiDeviceDev: all
    run:
      config: Debug
    archive:
      config: Release
