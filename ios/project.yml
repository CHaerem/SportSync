name: Sportivista
options:
  bundleIdPrefix: app.sportivista.ios
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: false

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.1"
    CURRENT_PROJECT_VERSION: "4"
    # WP-17: iPhone-only (iPad runs the app in compatibility mode). "1,2" made
    # App Store validation demand all four iPad-multitasking orientations,
    # which fights the portrait-only calm design.
    TARGETED_DEVICE_FAMILY: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    ENABLE_PREVIEWS: YES
    # WP-10 scaffold must build+run on the Simulator with no Apple Developer
    # account. App Group entitlements are wired per-target below so WP-17
    # (real signing) only has to flip these back on — see ios/README.md.
    CODE_SIGN_STYLE: Automatic
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO
    CODE_SIGN_IDENTITY: ""
    DEVELOPMENT_TEAM: ""

targets:
  Sportivista:
    type: application
    postBuildScripts:
      # «Har jeg siste versjon?» — stamp the BUILT Info.plist with the short
      # hash of the last commit touching ios/ in the tree this build came from
      # («-dirty» appended when ios/ has uncommitted changes) + a build date.
      # Build-time only: no source file is generated, so SportivistaTests' direct
      # source compilation is unaffected. The app compares the stamp against
      # the published app-version.json (BuildStamp/AppVersionCheck).
      - name: Stamp build version
        script: |
          STAMP=$(git -C "$SRCROOT/.." log -1 --format=%h -- ios/ 2>/dev/null || echo ukjent)
          if ! git -C "$SRCROOT/.." diff --quiet -- ios/ 2>/dev/null; then STAMP="${STAMP}-dirty"; fi
          PLIST="$TARGET_BUILD_DIR/$INFOPLIST_PATH"
          /usr/libexec/PlistBuddy -c "Delete :SportivistaBuildStamp" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :SportivistaBuildStamp string $STAMP" "$PLIST"
          /usr/libexec/PlistBuddy -c "Delete :SportivistaBuildDate" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :SportivistaBuildDate string $(date '+%d.%m %H:%M')" "$PLIST"
        basedOnDependencyAnalysis: false
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Sportivista
      # WP-69: the versioned eval corpus lives with the tests (one source of
      # truth — the CI XCTest loads it from the test bundle), but the DEBUG
      # on-device eval screen (Sportivista/Eval/EvalView) loads it from the app
      # bundle, so bundle just this one JSON as an app resource. The widget
      # target deliberately does NOT list it (no eval code in the widget).
      - path: SportivistaTests/Fixtures/eval-corpus.json
        buildPhase: resources
      # The SHARED lens tunables — the SAME file the web serves at
      # docs/config/lens-config.json. LensConfig.swift decodes it from the bundle
      # (Feed/); change a value in that one file and both platforms follow.
      - path: ../docs/config/lens-config.json
        buildPhase: resources
      # The SHARED assistant vocabulary (docs/config/assistant-vocab.json) —
      # AssistantVocab.swift decodes it. NOT in the widget (no assistant there).
      - path: ../docs/config/assistant-vocab.json
        buildPhase: resources
    info:
      path: Sportivista/Info.plist
      properties:
        CFBundleDevelopmentRegion: nb
        CFBundleDisplayName: Sportivista
        # WP-17: XcodeGen bakes LITERAL "1.0"/"1" unless the keys explicitly
        # reference the build settings — TestFlight build 2 shipped as
        # CFBundleVersion 1 because of this (duplicate, rejected in processing).
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundlePackageType: APPL
        LSRequiresIPhoneOS: true
        # WP-17: standard HTTPS only — declares the exemption once so every
        # TestFlight upload skips the manual encryption-compliance question.
        ITSAppUsesNonExemptEncryption: false
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # WP-12: BGAppRefreshTask (BackgroundRefreshScheduler.swift) — both
        # keys are required by BGTaskScheduler regardless of how thin the
        # wrapper around it is.
        BGTaskSchedulerPermittedIdentifiers:
          - app.sportivista.refresh
        UIBackgroundModes:
          - fetch
        # WP-19: the `sportivista://` deep-link scheme the profile-share QR / link
        # opens (ProfileShareCodec). Custom scheme → no Associated-Domains
        # entitlement needed (free-account friendly).
        CFBundleURLTypes:
          - CFBundleURLName: app.sportivista.ios.profile
            CFBundleURLSchemes:
              - sportivista
    settings:
      base:
        PRODUCT_NAME: Sportivista
        PRODUCT_BUNDLE_IDENTIFIER: app.sportivista.ios
        CODE_SIGN_ENTITLEMENTS: Sportivista/Sportivista.entitlements
        # WP-17: iPhone-only — XcodeGen's per-target default is "1,2", which the
        # project-level setting does NOT override; must be set on each target.
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - target: SportivistaWidgetExtension
        embed: true

  SportivistaWidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: SportivistaWidget
      - path: Sportivista/DesignTokens.swift
      # WP-14: the widget's own timeline logic (WidgetTimelineBuilder.swift,
      # no import WidgetKit — see that file's header) needs the Codable
      # models, the FeedCompiler predicates + AgendaFormat/EventBridge
      # (bundled in Feed/, see AgendaFormat.swift's header on why), and just
      # the READ half of Sync — CacheStore + SyncState + DataStore, NOT
      # SyncClient.swift/Checksum.swift, so the widget target has no
      # network-capable code at all (INGEN nettverk i widgeten, per brief).
      - path: Sportivista/Models
      - path: Sportivista/Feed
      - path: Sportivista/Sync/CacheStore.swift
      - path: Sportivista/Sync/SyncState.swift
      - path: Sportivista/Sync/DataStore.swift
      # AppVersion is part of DataStore's read surface (loadAppVersion) — a
      # tiny Codable + pure check, no networking, so it stays widget-safe.
      - path: Sportivista/Sync/AppVersion.swift
      - path: Sportivista/Widget/WidgetTimelineBuilder.swift
      # Shared lens tunables — LensConfig (in Feed/) reads it from the widget
      # bundle too; a ~1KB decode, well inside the WidgetKit memory budget.
      - path: ../docs/config/lens-config.json
        buildPhase: resources
    info:
      path: SportivistaWidget/Info.plist
      properties:
        CFBundleDevelopmentRegion: nb
        CFBundleDisplayName: Sportivista
        # WP-17: XcodeGen bakes LITERAL "1.0"/"1" unless the keys explicitly
        # reference the build settings — TestFlight build 2 shipped as
        # CFBundleVersion 1 because of this (duplicate, rejected in processing).
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_NAME: SportivistaWidget
        PRODUCT_BUNDLE_IDENTIFIER: app.sportivista.ios.widget
        CODE_SIGN_ENTITLEMENTS: SportivistaWidget/SportivistaWidget.entitlements
        SKIP_INSTALL: YES
        TARGETED_DEVICE_FAMILY: "1"
        # WP-17: target-level signing so the widget can be embedded in the
        # signed device build (and GUI device runs work without CLI overrides).
        # Unsigned Simulator builds of the app target are unaffected — Simulator
        # signing is ad-hoc and the local identity exists on the only Mac that
        # builds iOS.
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_ALLOWED: YES
        CODE_SIGN_IDENTITY: "Apple Development"
        DEVELOPMENT_TEAM: "9LVCB72DT8"

  # WP-11: standalone (hostless) logic-test bundle for the Codable models in
  # Sportivista/Models — no TEST_HOST/BUNDLE_LOADER, since these are pure decoding
  # tests with no dependency on the app's UI/runtime. Compiles the Models
  # sources directly into the test bundle (same pattern the widget extension
  # already uses for DesignTokens.swift above) rather than linking the app
  # binary, so it needs no `@testable import`. WP-12 adds Sportivista/Sync the same
  # way, for SyncClient/CacheStore/DataStore's own hostless tests; WP-13 adds
  # Sportivista/Feed for the FeedCompiler predicate + golden-vector tests; WP-15
  # adds Sportivista/Notifications for NotificationPlanner's own hostless tests
  # (a recording NotificationScheduling double — no real UNUserNotificationCenter
  # call, no OS permission prompt, in this bundle).
  SportivistaTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: SportivistaTests
      # LaunchTrace: AgendaViewModel (compiled below) calls it — DEBUG-only
      # prints, no-op otherwise; the hostless bundle needs the symbol.
      - path: Sportivista/LaunchTrace.swift
      - path: Sportivista/Models
      - path: Sportivista/Sync
      - path: Sportivista/Feed
      - path: Sportivista/Notifications
      # WP-14: AgendaViewModel + its SwiftUI views (day-grouped agenda,
      # detail sheets) and the widget's pure timeline builder — compiled
      # directly into this hostless bundle, same "no @testable import"
      # pattern as Models/Sync/Feed above, so AgendaViewModelTests and
      # WidgetTimelineBuilderTests can drive them with no running app.
      # DesignTokens.swift is needed here too: Agenda's SwiftUI views
      # reference SportivistaTokens / Font.sportivista directly (same reason
      # SportivistaWidgetExtension already lists it explicitly, above).
      - path: Sportivista/DesignTokens.swift
      # WP-14.2: the manual theme override enum (pure cycling/mapping logic,
      # unit-tested directly — no `@testable import`, same pattern as
      # DesignTokens.swift above).
      - path: Sportivista/ThemeOverride.swift
      # WP-14.3: `.sportivistaTapTarget()` / `SportivistaActionButtonStyle` — the shared
      # tap-target helpers Agenda/Assistant's views call; same "no @testable
      # import" pattern as DesignTokens.swift/ThemeOverride.swift above.
      - path: Sportivista/Interaction.swift
      - path: Sportivista/Agenda
      - path: Sportivista/Widget
      # WP-16: the FM-lekegrind's sources — the pure pipeline (grounding, diff,
      # persistence, the mock parser) plus the FoundationModels-backed assistant
      # and its @Generable schema. Compiled directly into the hostless bundle
      # (same "no @testable import" pattern). FoundationModels is present in the
      # Simulator SDK so this compiles fine; the tests drive MockInterestAssistant
      # only (Apple Intelligence can't run in CI/Simulator — see AssistantView's
      # header and ios/README.md).
      - path: Sportivista/Assistant
      # WP-48: the profile domain (ProfileStore/InterestProfile/merge/sync-model/
      # backend/coordinator/CloudKit, the share codec + QR + panel, ResetService,
      # the EffectiveInterests bridge, and the view model's profil-sync extension)
      # moved out of Assistant/ into its own Sportivista/Profile — it had only landed in
      # Assistant/ because that folder was already wired in here. Same hostless
      # "no @testable import" pattern; app + SportivistaDeviceDev pick it up via
      # `path: Sportivista`, the widget deliberately does NOT (no profile/personal-
      # context code in the widget). Sportivista/Demo (LensDemoSeed/MemoryDemoSeed) is
      # just as deliberately NOT listed here nor in the widget target: the demo
      # seeds are app-only screenshot harnesses, and keeping them out of the
      # explicit source lists is what makes that quarantine structural.
      - path: Sportivista/Profile
      # WP-30: personal-memory sources (facts/episodic/behaviour store over the
      # same ProfileSyncState, retrieval digest, distiller, spoiler shield, the
      # "Hva jeg vet om deg" page) — compiled directly into the hostless bundle,
      # same "no @testable import" pattern. The app + SportivistaDeviceDev targets pick
      # these up via `path: Sportivista`; the widget deliberately does NOT (memory is
      # app-only — the widget has no network/personal-context code).
      - path: Sportivista/Memory
      # WP-106: the Nyheter board — the pure lens/board builders (NewsLens/
      # NewsBoard) + the SwiftUI view — compiled directly into the hostless
      # bundle so NewsLensTests/NewsBoardTests drive the matching + section
      # assembly with no running app (same "no @testable import" pattern). App +
      # SportivistaDeviceDev pick these up via `path: Sportivista`; the widget
      # deliberately does NOT (the board is app-only — profile lens + UI + the
      # FollowedListView link, none of which the widget compiles). The Nyheter
      # models (NewsItem/FeaturedBrief/RecentResults) live in Sportivista/Models
      # instead, so the widget-shared DataStore that loads them still compiles.
      - path: Sportivista/News
      # WP-115: the shared SFSafariViewController wrapper (SafariView) — NewsView
      # (compiled above) references it, so the hostless bundle needs it too. Its
      # Reader-hint config is unit-tested directly (SafariViewTests) without
      # instantiating the controller. App + SportivistaDeviceDev pick it up via
      # `path: Sportivista`; the widget deliberately does NOT (no outbound links).
      - path: Sportivista/Shared
      # WP-31: the first-run onboarding — pure gate/starter-pack logic + the
      # SwiftUI flow — compiled directly into the hostless bundle (same "no
      # @testable import" pattern). App + SportivistaDeviceDev pick these up via
      # `path: Sportivista`; the widget deliberately does NOT (onboarding is app-only).
      - path: Sportivista/Onboarding
      # WP-69: the FM-eval harness — the pure corpus/scorer/runner + the
      # DEBUG-only eval screen — compiled into the hostless bundle so
      # EvalCorpusTests can drive the SAME corpus through MockInterestAssistant
      # that the on-device screen drives through the real FoundationModels one
      # (same "no @testable import" pattern). App + SportivistaDeviceDev pick these up
      # via `path: Sportivista`; the corpus JSON they bundle as a resource (above).
      - path: Sportivista/Eval
      # WP-63: the perf-instrumentation sources — the os_signpost helper
      # (PerfSignpost) plus the local MetricKit log + subscriber (MetricLog/
      # MetricSubscriber). Needed in the hostless bundle because AgendaViewModel
      # (Sportivista/Agenda) and AssistantViewModel (Sportivista/Assistant) — already compiled
      # in above — now reference PerfSignpost, and MetricSubscriberTests /
      # MetricLogStoreTests drive the store + summarizer directly (same "no
      # @testable import" pattern). App + SportivistaDeviceDev pick these up via
      # `path: Sportivista`; the widget deliberately does NOT (no perf/telemetry code in
      # the widget — it has no reload/assistant hotpath and no app lifecycle).
      - path: Sportivista/Perf
      # WP-13: the SAME golden feed-vector fixtures the JS reference test
      # (tests/feed-vectors.test.js) replays — referenced directly at the repo
      # root, never copied, so the two runners can never drift. XcodeGen
      # resolves this relative to project.yml (ios/) and supports source paths
      # outside it; `buildPhase: resources` bundles the *.json (and the README/
      # DIVERGENCES docs) so FeedVectorTests can load them from the test bundle
      # at runtime. `type: folder` keeps the folder as a bundle subdirectory
      # ("feed-vectors") so the vector JSONs never collide with the WP-11
      # Fixtures JSONs already flattened into the bundle root.
      - path: ../tests/fixtures/feed-vectors
        buildPhase: resources
        type: folder
      # Shared lens tunables (docs/config/lens-config.json) — bundled so
      # LensConfig (Feed/) resolves it in the test bundle exactly as in the app,
      # and FeedVectorTests prove the extraction is byte-identical to the old
      # hard-coded constants.
      - path: ../docs/config/lens-config.json
        buildPhase: resources
      # Shared assistant vocabulary — AssistantVocab resolves it in the test bundle;
      # AgendaFilterTests/EvalCorpusTests prove the extraction changed nothing.
      - path: ../docs/config/assistant-vocab.json
        buildPhase: resources
    resources:
      - path: SportivistaTests/Fixtures
    info:
      path: SportivistaTests/Info.plist
      properties:
        CFBundleDevelopmentRegion: nb
    settings:
      base:
        PRODUCT_NAME: SportivistaTests
        PRODUCT_BUNDLE_IDENTIFIER: app.sportivista.ios.tests

  # WP-16: a device-flavoured build of the SAME app sources (path: Sportivista — so it
  # includes Assistant/ and its on-device FoundationModels code) for running on
  # a PHYSICAL iPhone. WP-17 (18.07.2026, paid Apple Developer team — the free
  # personal team 9LVCB72DT8 was CONVERTED in place by Individual enrollment, so
  # the team ID is unchanged): the two free-account constraints are lifted —
  #   (a) this target now signs against the FULL entitlements file
  #       (Sportivista/Sportivista.entitlements: App Group + CloudKit) and compiles
  #       with -D SPORTIVISTA_CLOUDKIT, flipping ProfileSyncBackendFactory to
  #       CloudKitProfileSync (P360).
  #   (b) it embeds SportivistaWidgetExtension (the old "Embedded binary is not
  #       signed with the same certificate" failure was a free-team limitation).
  # This target and the widget both carry Automatic signing + the team at the
  # target level, so plain GUI builds work; no CI machine builds iOS (everything
  # builds on the owner's Mac, where the signing identity lives).
  # The Simulator `Sportivista` target + scheme and every existing test are unchanged;
  # this target is purely additive and lives in its own `SportivistaDeviceDev` scheme.
  SportivistaDeviceDev:
    type: application
    postBuildScripts:
      # «Har jeg siste versjon?» — stamp the BUILT Info.plist with the short
      # hash of the last commit touching ios/ in the tree this build came from
      # («-dirty» appended when ios/ has uncommitted changes) + a build date.
      # Build-time only: no source file is generated, so SportivistaTests' direct
      # source compilation is unaffected. The app compares the stamp against
      # the published app-version.json (BuildStamp/AppVersionCheck).
      - name: Stamp build version
        script: |
          STAMP=$(git -C "$SRCROOT/.." log -1 --format=%h -- ios/ 2>/dev/null || echo ukjent)
          if ! git -C "$SRCROOT/.." diff --quiet -- ios/ 2>/dev/null; then STAMP="${STAMP}-dirty"; fi
          PLIST="$TARGET_BUILD_DIR/$INFOPLIST_PATH"
          /usr/libexec/PlistBuddy -c "Delete :SportivistaBuildStamp" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :SportivistaBuildStamp string $STAMP" "$PLIST"
          /usr/libexec/PlistBuddy -c "Delete :SportivistaBuildDate" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :SportivistaBuildDate string $(date '+%d.%m %H:%M')" "$PLIST"
        basedOnDependencyAnalysis: false
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Sportivista
        # This target's own Info.plist lives at SportivistaDeviceDev/Info.plist (below),
        # so XcodeGen would otherwise treat the app's Sportivista/Info.plist as an
        # ordinary resource and copy it into the bundle — colliding with the
        # processed Info.plist ("Multiple commands produce …/Info.plist"). The
        # Simulator `Sportivista` target doesn't hit this because its info.path IS
        # Sportivista/Info.plist (auto-excluded). Exclude it explicitly here.
        excludes:
          - Info.plist
      # WP-69: the eval corpus as an app resource, so the DEBUG on-device eval
      # screen (Sportivista/Eval/EvalView) can load it from Bundle.main on the
      # physical iPhone — this is the build the owner actually runs the eval on.
      - path: SportivistaTests/Fixtures/eval-corpus.json
        buildPhase: resources
    dependencies:
      # WP-17: embed the widget on device too (paid team signs both with the
      # same identity; the free-team embed failure is history).
      - target: SportivistaWidgetExtension
    info:
      path: SportivistaDeviceDev/Info.plist
      properties:
        CFBundleDevelopmentRegion: nb
        CFBundleDisplayName: Sportivista
        # WP-17: XcodeGen bakes LITERAL "1.0"/"1" unless the keys explicitly
        # reference the build settings — TestFlight build 2 shipped as
        # CFBundleVersion 1 because of this (duplicate, rejected in processing).
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundlePackageType: APPL
        LSRequiresIPhoneOS: true
        # WP-17: standard HTTPS only — declares the exemption once so every
        # TestFlight upload skips the manual encryption-compliance question.
        ITSAppUsesNonExemptEncryption: false
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        BGTaskSchedulerPermittedIdentifiers:
          - app.sportivista.refresh
        UIBackgroundModes:
          - fetch
        # WP-19: same `sportivista://` deep-link scheme on the device build so a
        # scanned QR / share link imports (LocalOnly merge — no CloudKit needed).
        CFBundleURLTypes:
          - CFBundleURLName: app.sportivista.ios.profile
            CFBundleURLSchemes:
              - sportivista
    settings:
      base:
        # Distinct PRODUCT_NAME → distinct `SportivistaDeviceDev.app` output, so it
        # never collides with the Simulator `Sportivista` target's `Sportivista.app` (the new
        # build system flags a shared output path project-wide, even across
        # schemes). The home-screen name stays "Sportivista" via CFBundleDisplayName
        # above; only the on-disk product bundle name differs.
        PRODUCT_NAME: SportivistaDeviceDev
        # Reuses the app's own bundle id (NOT a distinct one): the free personal
        # team already has a valid "iOS Team Provisioning Profile: app.sportivista.ios"
        # covering this device, and a free account can't provision an unlimited
        # number of new App IDs — so the device build signs against the existing
        # profile. The Simulator `Sportivista` target shares this id but never signs
        # (CODE_SIGNING_ALLOWED=NO), so the two don't collide at install time
        # (only one is ever installed per destination). Xcode may warn about the
        # shared id; that's expected and harmless here.
        PRODUCT_BUNDLE_IDENTIFIER: app.sportivista.ios
        # WP-17: full paid-team entitlements (App Group + CloudKit) — the WP-16
        # empty device entitlements file is gone. -D SPORTIVISTA_CLOUDKIT flips
        # ProfileSyncBackendFactory to CloudKitProfileSync.
        CODE_SIGN_ENTITLEMENTS: Sportivista/Sportivista.entitlements
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) SPORTIVISTA_CLOUDKIT"
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_ALLOWED: YES
        CODE_SIGNING_REQUIRED: YES
        CODE_SIGN_IDENTITY: "Apple Development"
        DEVELOPMENT_TEAM: "9LVCB72DT8"

  # WP-70: the XCUITest bundle — end-to-end regression of the main UX flows in
  # the Simulator (onboarding, follow-via-command-line, starter-pack toggles,
  # event detail + "hvorfor vises denne", theme toggle, reset) plus a cold-start
  # `XCTApplicationLaunchMetric` baseline. Unlike SportivistaTests (a hostless LOGIC
  # bundle) a UI-test bundle DRIVES the running app through XCUIApplication, so
  # it needs `TEST_TARGET_NAME: Sportivista` (the app under test) + a dependency on it
  # — the runner installs and launches that app in the Simulator. It compiles
  # ONLY its own Swift (SportivistaUITests/); it never links the app's sources (the
  # opposite of the hostless bundles), so there is no `path: Sportivista` here. The app
  # is driven against the deterministic `SPORTIVISTA_DEMO=uitest` harness (UITestSeed)
  # — mock assistant + seeded cache, no network, no Apple Intelligence — so the
  # flows are stable in CI/Simulator. CI requirement is only that this target
  # BUILDS (it is in the Sportivista scheme's build set below); the flows are run from
  # the dedicated SportivistaUITests scheme locally / on the PR agent's Mac.
  SportivistaUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: SportivistaUITests
    dependencies:
      - target: Sportivista
    info:
      path: SportivistaUITests/Info.plist
      properties:
        CFBundleDevelopmentRegion: nb
    settings:
      base:
        PRODUCT_NAME: SportivistaUITests
        PRODUCT_BUNDLE_IDENTIFIER: app.sportivista.ios.uitests
        # The app the runner installs + launches + attaches to. XcodeGen turns
        # this into the TEST_TARGET_NAME / test-host wiring a UI-test bundle needs.
        TEST_TARGET_NAME: Sportivista

schemes:
  # Unchanged from before WP-70: the fast, hostless unit run. `xcodebuild test
  # -scheme Sportivista` stays unit-only (SportivistaTests) so the ios/README command and CI
  # gate are exactly as documented — the UI suite lives in its own scheme below.
  Sportivista:
    build:
      targets:
        Sportivista: all
        SportivistaWidgetExtension: all
        SportivistaTests: [test]
    test:
      config: Debug
      targets:
        - SportivistaTests
    run:
      config: Debug
    archive:
      config: Release
  SportivistaWidgetExtension:
    build:
      targets:
        SportivistaWidgetExtension: all
    run:
      config: Debug
    archive:
      config: Release
  # WP-16: builds only the widget-free, App-Group-free device app (see the
  # SportivistaDeviceDev target above). Used for the physical-iPhone build/install.
  SportivistaDeviceDev:
    build:
      targets:
        SportivistaDeviceDev: all
    run:
      config: Debug
    archive:
      config: Release
  # WP-70: the UI-test scheme. Builds the app + the widget it embeds (the app
  # can't launch in the Simulator without its embedded extension) and runs the
  # XCUITest bundle. Kept SEPARATE from the Sportivista scheme so the everyday unit run
  # stays fast; this scheme is what proves the UI target builds ("alle schemes
  # bygger") and is the entry point for running the flows + the launch metric:
  #   xcodebuild test -project Sportivista.xcodeproj -scheme SportivistaUITests \
  #     -destination 'platform=iOS Simulator,name=iPhone 17'
  SportivistaUITests:
    build:
      targets:
        Sportivista: all
        SportivistaWidgetExtension: all
        SportivistaUITests: [test]
    test:
      config: Debug
      targets:
        - SportivistaUITests
    run:
      config: Debug
