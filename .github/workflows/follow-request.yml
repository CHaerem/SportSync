name: Follow request to PR

# A "follow-request" Issue Form submission → a PR that edits interests.json.
# The user reviews the diff and merges; nothing lands on main until they do.
on:
  issues:
    types: [opened]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: follow-request-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  apply:
    # Only the repo OWNER's own follow-request issues may edit interests.json.
    # The repo is public, so anyone can open an issue (and the template applies
    # the label) — but author_association is set by GitHub from the real author's
    # relationship to the repo and can't be forged, so a stranger's issue is
    # ignored. This is the control boundary (essential before any auto-merge).
    if: >-
      github.event.issue.author_association == 'OWNER' &&
      contains(join(github.event.issue.labels.*.name, ','), 'follow-request')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: Apply the request to interests.json
        id: apply
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: node scripts/apply-follow-request.js
      # Push the change to a branch, then open a PR automatically. That needs the
      # repo setting "Allow GitHub Actions to create and approve pull requests"
      # (Settings → Actions → General → Workflow permissions). If it's off, gh pr
      # create fails and we fall back to commenting a one-click compare link — so
      # this works either way, and upgrades to auto-PR the moment the box is ticked.
      - name: Open a Pull Request (fall back to a review link)
        env:
          GH_TOKEN: ${{ github.token }}
          PR_TITLE: ${{ steps.apply.outputs.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          git config user.name "SportSync bot"
          git config user.email "action@github.com"
          BRANCH="follow-request/${ISSUE_NUMBER}"
          git checkout -b "$BRANCH"
          git add scripts/config/interests.json
          git commit -m "${PR_TITLE} (closes #${ISSUE_NUMBER})"
          git push -u origin "$BRANCH" --force
          if PR_URL=$(gh pr create --base main --head "$BRANCH" --title "$PR_TITLE" --body-file pr-body.md 2>/dev/null); then
            gh issue comment "$ISSUE_NUMBER" --body "Laget en Pull Request du kan se over og merge: ${PR_URL}"
          else
            COMPARE="https://github.com/${REPO}/compare/main...${BRANCH}?expand=1"
            gh issue comment "$ISSUE_NUMBER" --body "Klar til gjennomgang: **${PR_TITLE}**. Åpne lenka, se over diffen, «Create pull request» → «Merge»: ${COMPARE}"
          fi
      - name: Report failure on the issue
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --body "Kunne ikke behandle forespørselen automatisk. Sjekk at feltene stemmer, eller rediger interests.json direkte. Detaljer i Actions-loggen."
