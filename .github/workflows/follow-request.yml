name: Follow request

# A "follow-request" Issue Form submission edits interests.json directly on main
# (OWNER-gated) and triggers the static pipeline to republish + deploy. Auto-apply:
# no PR, no merge step. The owner gate is what keeps strangers from triggering it.
on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write
  actions: write # to dispatch the static pipeline (republish + deploy)

concurrency:
  group: follow-request-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  apply:
    # Only the repo OWNER's own follow-request issues may edit interests.json.
    # The repo is public, so anyone can open an issue (and the template applies
    # the label) — but author_association is set by GitHub from the real author's
    # relationship to the repo and can't be forged, so a stranger's issue is
    # ignored. This is the control boundary (essential before any auto-merge).
    if: >-
      github.event.issue.author_association == 'OWNER' &&
      contains(join(github.event.issue.labels.*.name, ','), 'follow-request')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: Apply the request to interests.json
        id: apply
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: node scripts/apply-follow-request.js
      # Auto-apply: commit the change straight to main, then kick the static
      # pipeline to republish docs/data + deploy. (A GITHUB_TOKEN push doesn't
      # trigger other workflows, so we dispatch it explicitly.) Safe because the
      # job only runs for the OWNER's own issues (see the if-gate above).
      - name: Commit to main and trigger rebuild + deploy
        env:
          GH_TOKEN: ${{ github.token }}
          PR_TITLE: ${{ steps.apply.outputs.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          git config user.name "SportSync bot"
          git config user.email "action@github.com"
          git add scripts/config/interests.json
          git commit -m "${PR_TITLE} (from #${ISSUE_NUMBER})"
          git pull --rebase origin main
          git push origin main
          SHA=$(git rev-parse --short HEAD)
          gh workflow run "Static data pipeline"
          gh issue comment "$ISSUE_NUMBER" --body "✅ Lagt inn: **${PR_TITLE}** (commit \`${SHA}\`). Siden bygges om og oppdaterer seg om et par minutter."
          gh issue close "$ISSUE_NUMBER"
      - name: Report failure on the issue
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --body "Kunne ikke behandle forespørselen automatisk. Sjekk at feltene stemmer, eller rediger interests.json direkte. Detaljer i Actions-loggen."
