name: Static data pipeline

on:
  schedule:
    - cron: "0 5-21 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/fetch/**"
      - "scripts/build-events.js"
      - "scripts/fetch-standings.js"
      - "scripts/fetch-rss.js"
      - "scripts/fetch-results.js"

concurrency:
  group: sportsync-static-pipeline
  cancel-in-progress: false

jobs:
  fetch-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Check out with a PAT so the docs/data commit this job pushes TRIGGERS
          # preview-deploy. Pushes made with the default GITHUB_TOKEN deliberately
          # do NOT trigger workflows (anti-recursion), which meant hourly data
          # landed on main but never auto-published. See pages-deploy-gotchas.
          # Falls back to github.token when DEPLOY_PAT is unset — the workflow
          # keeps working (just without auto-deploy) until the secret is added.
          # No loop risk: this pipeline's own push trigger watches scripts/** only,
          # not docs/**, so a data push won't re-run the pipeline.
          token: ${{ secrets.DEPLOY_PAT || github.token }}
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: mkdir -p docs/data
      - run: node scripts/fetch/index.js
      - run: node scripts/fetch-standings.js
        continue-on-error: true
      - run: node scripts/fetch-rss.js
        continue-on-error: true
      - run: node scripts/fetch-results.js
        continue-on-error: true
      - run: node scripts/fetch-tvkampen.js
        continue-on-error: true
      - run: node scripts/build-events.js
      - run: node scripts/validate-events.js
      - run: node scripts/detect-coverage-gaps.js
        continue-on-error: true
      - run: node scripts/aggregate-calibration.js
        continue-on-error: true
      - run: node scripts/build-ics.js
      - name: Write meta
        run: echo "{\"lastUpdated\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > docs/data/meta.json
      - name: Commit
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add docs/data/
          git diff --staged --quiet || git commit -m "Update sports data $(date -u +%H:%MZ)"
          git push || (git pull --rebase origin ${{ github.ref_name }} && git push)
