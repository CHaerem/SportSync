name: Static data pipeline

on:
  schedule:
    # WP-173: kvelds-/natt-dekning — 22/23/00/03 UTC i tillegg til den gamle
    # 05–21-rekka, så «hva skjedde i går kveld»-vinduet (CL-kamper som ender
    # ~23 Oslo, sen F1/tennis/CS2) er dekket FØR morgensjekket i stedet for
    # først 07:00. Actions er gratis på public repo; kvote-guvernøren gjelder
    # AI-agentene, ikke den statiske pipelinen.
    - cron: "0 5-21 * * *"
    - cron: "0 22,23,0,3 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/fetch/**"
      - "scripts/build-events.js"
      - "scripts/fetch-standings.js"
      - "scripts/fetch-rss.js"
      - "scripts/fetch-results.js"
      # A merged follow-request edits interests.json — rebuild so the published
      # copy + the board (relevance, must-watch tags) refresh and the site deploys.
      - "scripts/config/interests.json"

concurrency:
  group: sportsync-static-pipeline
  cancel-in-progress: false

jobs:
  fetch-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    outputs:
      # Whether this run actually changed data. The deploy job below runs only
      # when true, so we never spend a Pages build on a no-op run.
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - uses: actions/checkout@v5
        with:
          # app-version.json stempler «siste ios/-commit» via git log — en grunn
          # checkout gjør det til HEAD (enhver datacommit), som ga falske
          # «NYERE FINNES» i appen. Full historikk er noen sekunder ekstra.
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - run: npm ci
      - run: mkdir -p docs/data
      - run: node scripts/fetch/index.js
      - run: node scripts/fetch-standings.js
        continue-on-error: true
      - run: node scripts/fetch-rss.js
        continue-on-error: true
      - run: node scripts/fetch-results.js
        continue-on-error: true
      - run: node scripts/fetch-tvkampen.js
        continue-on-error: true
      - run: node scripts/build-events.js
      - run: node scripts/validate-events.js
      - run: node scripts/detect-coverage-gaps.js
        continue-on-error: true
      - run: node scripts/aggregate-calibration.js
        continue-on-error: true
      - run: node scripts/build-ics.js
      - name: Write meta
        run: echo "{\"lastUpdated\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > docs/data/meta.json
      - name: Commit
        id: commit
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add docs/data/
          if git diff --staged --quiet; then
            echo "No data changes — nothing to commit or deploy."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Update sports data $(date -u +%H:%MZ)"
            # A scripts/** push can race the hourly cron: two runs regenerate the
            # same data files and both try to commit. On rejection, rebase onto
            # the latest remote and AUTO-RESOLVE the regenerated-data conflicts
            # in our favour (both snapshots are equally fresh) instead of failing
            # the way a plain `pull --rebase` did. Files only the other run
            # changed (e.g. agent outputs like featured.json) don't conflict and
            # are preserved. Retry a few times, then fail loudly if still stuck.
            pushed=""
            for attempt in 1 2 3 4 5; do
              if git push; then pushed=1; break; fi
              echo "push rejected — rebasing onto latest ${{ github.ref_name }} (attempt $attempt)"
              git pull --rebase -X theirs origin ${{ github.ref_name }} || git rebase --abort || true
            done
            [ -n "$pushed" ] || { echo "::error::could not push data after 5 attempts"; exit 1; }
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  # Publish the data this run just committed. We CALL preview-deploy instead of
  # relying on its push trigger: the commit above is pushed with GITHUB_TOKEN,
  # and GitHub deliberately does not let GITHUB_TOKEN pushes trigger workflows
  # (anti-recursion). A direct workflow_call has no trigger to be suppressed and
  # needs no PAT. preview-deploy keeps its own `concurrency: pages-deploy`, so a
  # called deploy still serialises with merge-triggered deploys (never two at
  # once — that mid-flight collision is what corrupted the Pages environment).
  deploy:
    needs: fetch-and-build
    if: needs.fetch-and-build.outputs.changed == 'true'
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/preview-deploy.yml
