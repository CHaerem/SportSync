name: Research agent

on:
  schedule:
    - cron: "15 */4 * * *"
  workflow_dispatch:
    inputs:
      tier:
        description: "Model tier"
        type: choice
        options:
          - standard
          - deep
        default: standard

concurrency:
  group: sportsync-research
  cancel-in-progress: false

jobs:
  research:
    runs-on: ubuntu-latest
    # Fable 5 turns run longer than Opus (single requests can take many minutes),
    # so the deep tier needs headroom.
    timeout-minutes: 40
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - run: npm ci

      # Governor: research is critical, so it only skips when quota is near-exhausted.
      # This — not a "fail loudly on no commit" heuristic — is how quota exhaustion is
      # handled. A run that finds nothing new (board already complete) is a legitimate
      # no-op, not a failure.
      - id: usage
        run: node scripts/usage-gate.js critical
        env:
          # WP-94-oppfølger: gate-steget kan nå hente FERSK kvote-avlesning
          # (usage-gate.js >10min-stien) i stedet for å stole på inntil 1t gammel
          # snapshot — tokenet er samme secret usage-monitor bruker, read-only kall.
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

      # Model strategy (Fable 5 is ~2x the price of Opus 4.8 and is not the default
      # upgrade path — Anthropic reserves it for the most demanding long-horizon work):
      #   - standard → Opus 4.8 only. The 4-hourly workhorse. Opus is always available
      #                on this tier, so the action's exit status is trustworthy — no
      #                commit-detection heuristic, no false failures on quiet runs.
      #   - deep     → Fable 5 (most capable) with an Opus 4.8 safety net. Used for the
      #                heavy runs: scout / coverage-critic escalations (they pass
      #                `-f tier=deep`) and one weekly deep sweep (Monday 04:xx UTC).
      #                Fable can be unavailable (e.g. weekly quota exhausted — it error-
      #                reports as job success), so here we keep snapshot + did-it-commit
      #                + Opus fallback. A no-op is still legitimate, so we do NOT fail
      #                loudly when neither model commits — the usage gate owns quota.
      - name: Resolve tier
        id: tier
        if: steps.usage.outputs.run == 'true'
        run: |
          T="${{ github.event.inputs.tier }}"
          if [ -z "$T" ]; then
            # Scheduled run: one deep sweep a week (Monday 04:xx UTC), else standard.
            if [ "$(date -u +%u)" = "1" ] && [ "$(date -u +%H)" = "04" ]; then
              T="deep"
            else
              T="standard"
            fi
          fi
          echo "tier=$T" >> "$GITHUB_OUTPUT"
          echo "Research tier: $T"

      # ---------- STANDARD tier: Opus 4.8 (the workhorse) ----------
      - name: Research — Opus 4.8 (standard)
        if: steps.usage.outputs.run == 'true' && steps.tier.outputs.tier == 'standard'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model claude-opus-4-8
            --max-turns 150
            --allowedTools "Read,Write,Edit,Glob,Grep,Task,WebSearch,WebFetch,Bash(node:*),Bash(git:*),Bash(date:*),Bash(jq:*)"
          prompt: |
            Read scripts/agents/research.md and execute it.
            When done, commit your changes:
              git add docs/data/events.json docs/data/research-log.json scripts/config/tracked.json .claude/skills/
              git commit -m "research-agent: update tracked events"
              git push || (git pull --rebase -X theirs origin main && git push)

      # ---------- DEEP tier: Fable 5 preferred → Opus 4.8 fallback ----------
      - name: Snapshot HEAD before deep research
        id: pre
        if: steps.usage.outputs.run == 'true' && steps.tier.outputs.tier == 'deep'
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Research — Fable 5 (deep, preferred)
        if: steps.usage.outputs.run == 'true' && steps.tier.outputs.tier == 'deep'
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model claude-fable-5
            --max-turns 150
            --allowedTools "Read,Write,Edit,Glob,Grep,Task,WebSearch,WebFetch,Bash(node:*),Bash(git:*),Bash(date:*),Bash(jq:*)"
          prompt: |
            Read scripts/agents/research.md and execute it.
            When done, commit your changes:
              git add docs/data/events.json docs/data/research-log.json scripts/config/tracked.json .claude/skills/
              git commit -m "research-agent: update tracked events"
              git push || (git pull --rebase -X theirs origin main && git push)

      - name: Did Fable 5 do the work?
        id: gate
        if: steps.usage.outputs.run == 'true' && steps.tier.outputs.tier == 'deep'
        run: |
          if [ "$(git rev-parse HEAD)" != "${{ steps.pre.outputs.sha }}" ]; then
            echo "Fable 5 produced a commit — done, skipping fallback."
            echo "fallback=false" >> "$GITHUB_OUTPUT"
          else
            echo "Fable 5 produced no commit (unavailable / quota / quiet run) — falling back to Opus 4.8."
            echo "fallback=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Research — Opus 4.8 (deep fallback)
        if: steps.usage.outputs.run == 'true' && steps.tier.outputs.tier == 'deep' && steps.gate.outputs.fallback == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model claude-opus-4-8
            --max-turns 150
            --allowedTools "Read,Write,Edit,Glob,Grep,Task,WebSearch,WebFetch,Bash(node:*),Bash(git:*),Bash(date:*),Bash(jq:*)"
          prompt: |
            Read scripts/agents/research.md and execute it.
            When done, commit your changes:
              git add docs/data/events.json docs/data/research-log.json scripts/config/tracked.json .claude/skills/
              git commit -m "research-agent: update tracked events"
              git push || (git pull --rebase -X theirs origin main && git push)
