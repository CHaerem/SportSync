# TestFlight-release-lanen (WP-17 CI/CD): arkiverer, cloud-signerer og laster
# opp appen fra en ren checkout — uavhengig av eierens Mac og den flakete
# Xcode-GUI-sesjonen. Lukker enhets-løkka (WP-137): eieren dogfooder alltid siste
# versjon, ikke et bygg som henger døgn bak fiksene på main.
#
# TRIGGERE — ekte kontinuerlig levering på HVER ny iOS-versjon:
#   1. push til main under `ios/**` — HENDELSESDREVET: en menneske-merge av en
#      iOS-endring laster opp til TestFlight UMIDDELBART (ingen intervall-vente).
#   2. schedule (hver time, aktive timer) — SIKKERHETSNETT: fanger ios/-endringer
#      som IKKE utløser (1) — nemlig auto-merges fra selv-fikser-løkkene (ui-fix/
#      self-repair/improve), som pusher med GITHUB_TOKEN, og en GITHUB_TOKEN-push
#      utløser aldri en push-trigger (samme grunn som static-pipelinen må kicke
#      deploy eksplisitt). `detect` bygger da kun hvis ios/ endret seg siden siste
#      opplasting (stampen i testflight.json) — ellers gratis skip.
#   3. workflow_dispatch / `ios-v*`-tag — manuell/eksplisitt release.
# `detect` (billig ubuntu) serialiserer + avduplikerer: på schedule skipper den
# macos-bygget når ios/ er uendret; på (1)/(3) bygger den alltid. Concurrency-
# gruppa (cancel-in-progress: false) sikrer at to opplastinger aldri kjører
# samtidig og at ingen merge går tapt i en byge.
#
# Krever tre repo-secrets fra en ASC-nøkkel med ADMIN-rolle (App Manager kan
# ikke cloud-signere — lærdom fra første opplasting): ASC_KEY_ID,
# ASC_ISSUER_ID, ASC_PRIVATE_KEY (innholdet i .p8-filen).
#
# Byggnummer: ASC er fasit (scripts/next-testflight-build.js henter maks+1),
# så lokale og CI-opplastinger deler én monoton rekke. Etter opplasting
# registreres bygget (scripts/record-testflight.js) og committes til main —
# app-version.json får da testflight-blokken som gjør at TestFlight-bygg
# dømmes «SISTE» mot siste OPPLASTING, ikke siste commit. NB: record-commiten
# pusher med GITHUB_TOKEN og rører `scripts/config/`, ikke `ios/`, så den kan
# ikke re-utløse push-triggeren — ingen løkke.
name: iOS Release

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths: ["ios/**"] # hendelsesdrevet CD: hver iOS-endring til main → TestFlight
    tags: ["ios-v*"]
  schedule:
    # Sikkerhetsnett for GITHUB_TOKEN-merges (selv-fikser-løkkene) som push-
    # triggeren ikke ser. `detect` bygger kun ved reell ios/-endring siden bygg.
    - cron: "35 6-22 * * *"

concurrency:
  group: ios-release
  cancel-in-progress: false

permissions:
  contents: write # record-testflight-commiten til main
  actions: write # kicke static-pipeline etter registrering

jobs:
  # Billig ubuntu-vakt: på schedule bygger vi KUN når ios/ har endret seg siden
  # forrige TestFlight-opplasting (stampen i scripts/config/testflight.json).
  # Manuell dispatch og ios-v*-tag bygger alltid. Selv-skip → macos-jobben under
  # kjører ikke de timene ingenting endret seg (samme mønster som ios-tests.yml).
  detect:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0 # trenger historikk for rev-list mot stampen
      - id: check
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "event=${{ github.event_name }} → bygg alltid (manuell/tag)"
            exit 0
          fi
          STAMP=$(node -e "try{process.stdout.write(String(require('./scripts/config/testflight.json').stamp||''))}catch(e){process.stdout.write('')}")
          if [ -z "$STAMP" ] || ! git cat-file -e "${STAMP}^{commit}" 2>/dev/null; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "ingen/ukjent TF-stamp ('$STAMP') → bygg for sikkerhets skyld"
            exit 0
          fi
          if [ -n "$(git rev-list "${STAMP}..HEAD" -- ios/ | head -1)" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "ios/ endret siden bygg (stamp $STAMP) → bygg"
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "ios/ uendret siden bygg (stamp $STAMP) → hopp over (gratis)"
          fi

  release:
    needs: detect
    if: needs.detect.outputs.should_build == 'true'
    runs-on: macos-26
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0 # record-testflight trenger ekte siste-ios/-commit

      - name: Velg nyeste Xcode 26
        run: |
          XCODE=$(ls -d /Applications/Xcode_26*.app | sort -V | tail -1)
          sudo xcode-select -s "$XCODE"
          xcodebuild -version

      - name: Installer XcodeGen
        run: brew install xcodegen

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Neste byggnummer fra App Store Connect
        id: build
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: node scripts/next-testflight-build.js

      - name: Legg API-nøkkelen der xcodebuild leter
        env:
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          printf '%s' "$ASC_PRIVATE_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

      - name: Generer prosjekt
        working-directory: ios
        run: xcodegen generate

      - name: Arkiver (Release, cloud-signert)
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild -project Sportivista.xcodeproj -scheme SportivistaDeviceDev \
            -destination 'generic/platform=iOS' -archivePath build/Sportivista.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8 \
            -authenticationKeyID "${{ secrets.ASC_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_ISSUER_ID }}" \
            CURRENT_PROJECT_VERSION="${{ steps.build.outputs.build }}" \
            archive | grep -E "ARCHIVE (SUCCEEDED|FAILED)|error:" || true
          test -d build/Sportivista.xcarchive

      - name: Eksporter + last opp til App Store Connect
        working-directory: ios
        run: |
          set -o pipefail
          cat > export-options.plist <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store-connect</string>
            <key>destination</key><string>upload</string>
            <key>teamID</key><string>9LVCB72DT8</string>
            <key>signingStyle</key><string>automatic</string>
            <key>uploadSymbols</key><true/>
            <key>manageAppVersionAndBuildNumber</key><false/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive -archivePath build/Sportivista.xcarchive \
            -exportOptionsPlist export-options.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8 \
            -authenticationKeyID "${{ secrets.ASC_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_ISSUER_ID }}" \
            | grep -E "EXPORT (SUCCEEDED|FAILED)|Upload succeeded|error" | sort -u

      - name: Registrer opplastingen (app-version-kontrakten)
        run: |
          VERSION=$(grep -m1 'MARKETING_VERSION' ios/project.yml | sed 's/[^0-9.]//g')
          node scripts/record-testflight.js "${{ steps.build.outputs.build }}" "$VERSION"
          git config user.name "sportivista-release"
          git config user.email "actions@github.com"
          git add scripts/config/testflight.json
          git commit -m "testflight: registrer bygg $VERSION (${{ steps.build.outputs.build }}) [via release-lanen]"
          # Samme rebase-retry som static-pipeline: en samtidig datacommit på
          # main skal ikke felle en ellers vellykket opplasting (bitt av
          # branch-protection-varianten 19.07 — bygget var oppe, recorden røk).
          pushed=""
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then pushed=1; break; fi
            echo "push avvist — rebaser mot main (forsøk $attempt)"
            git pull --rebase origin main || { git rebase --abort || true; }
          done
          [ -n "$pushed" ] || { echo "::error::fikk ikke pushet testflight-recorden etter 5 forsøk — kjør scripts/record-testflight.js ${{ steps.build.outputs.build }} $VERSION lokalt"; exit 1; }

      - name: Kick den statiske pipelinen (publiser app-version.json)
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run static-pipeline.yml || echo "(pipeline-kick feilet — neste timekjøring tar den)"
