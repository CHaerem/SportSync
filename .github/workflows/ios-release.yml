# TestFlight-release-lanen (WP-17 CI/CD): arkiverer, cloud-signerer og laster
# opp appen fra en ren checkout — uavhengig av eierens Mac og den flakete
# Xcode-GUI-sesjonen. Lukker enhets-løkka (WP-137): eieren dogfooder alltid siste
# versjon, ikke et bygg som henger døgn bak fiksene på main.
#
# TRIGGERE — ekte kontinuerlig levering på HVER ny iOS-versjon:
#   1. push til main under `ios/**` — HENDELSESDREVET: en menneske-merge av en
#      iOS-endring laster opp til TestFlight UMIDDELBART (ingen intervall-vente).
#   2. schedule (hver time, aktive timer) — SIKKERHETSNETT: fanger ios/-endringer
#      som IKKE utløser (1) — nemlig auto-merges fra selv-fikser-løkkene (ui-fix/
#      self-repair/improve), som pusher med GITHUB_TOKEN, og en GITHUB_TOKEN-push
#      utløser aldri en push-trigger (samme grunn som static-pipelinen må kicke
#      deploy eksplisitt). `detect` bygger da kun hvis ios/ endret seg siden siste
#      opplasting (stampen i testflight.json) — ellers gratis skip.
#   3. workflow_dispatch — manuell/eksplisitt release, OG den pålitelige
#      re-utgivelses-stien (kjør workflowen mot en eksisterende commit for å
#      laste opp på nytt uten en ny ios/-endring).
# INGEN `ios-v*`-tag-trigger (WP-140): en tag-push arver samme paths-avgrensning
# som `push:`-blokka, så en `ios-v*`-tag lagt på en eksisterende commit UTEN nye
# ios/-endringer i pushet fyrte typisk IKKE — nettopp re-utgivelses-tilfellet
# taggen var ment for. Den upålitelige stien er fjernet; `workflow_dispatch` (3)
# er den pålitelige manuelle release-/re-release-stien.
# `detect` (billig ubuntu) serialiserer + avduplikerer: på schedule skipper den
# macos-bygget når ios/ er uendret; på (1)/(3) bygger den alltid. Concurrency-
# gruppa (cancel-in-progress: false) sikrer at to opplastinger aldri kjører
# samtidig og at ingen merge går tapt i en byge.
#
# Krever tre repo-secrets fra en ASC-nøkkel med ADMIN-rolle (App Manager kan
# ikke cloud-signere — lærdom fra første opplasting): ASC_KEY_ID,
# ASC_ISSUER_ID, ASC_PRIVATE_KEY (innholdet i .p8-filen).
#
# Byggnummer: ASC er fasit (scripts/next-testflight-build.js henter maks+1),
# så lokale og CI-opplastinger deler én monoton rekke. Etter opplasting
# registreres bygget (scripts/record-testflight.js) og committes til main —
# app-version.json får da testflight-blokken som gjør at TestFlight-bygg
# dømmes «SISTE» mot siste OPPLASTING, ikke siste commit. NB: record-commiten
# pusher med GITHUB_TOKEN og rører `scripts/config/`, ikke `ios/`, så den kan
# ikke re-utløse push-triggeren — ingen løkke.
name: iOS Release

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths: ["ios/**"] # hendelsesdrevet CD: hver iOS-endring til main → TestFlight
  schedule:
    # Sikkerhetsnett for GITHUB_TOKEN-merges (selv-fikser-løkkene) som push-
    # triggeren ikke ser. `detect` bygger kun ved reell ios/-endring siden bygg.
    - cron: "35 6-22 * * *"

concurrency:
  group: ios-release
  cancel-in-progress: false

permissions:
  contents: write # record-testflight-commiten til main
  actions: write # kicke static-pipeline etter registrering

jobs:
  # Billig ubuntu-vakt: på schedule bygger vi KUN når ios/ har endret seg siden
  # forrige TestFlight-opplasting (stampen i scripts/config/testflight.json).
  # Push på ios/** og manuell dispatch bygger alltid. Selv-skip → macos-jobben
  # under kjører ikke de timene ingenting endret seg (samme mønster som ios-tests.yml).
  detect:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0 # trenger historikk for rev-list mot stampen
      - id: check
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "event=${{ github.event_name }} → bygg alltid (push/manuell)"
            exit 0
          fi
          STAMP=$(node -e "try{process.stdout.write(String(require('./scripts/config/testflight.json').stamp||''))}catch(e){process.stdout.write('')}")
          if [ -z "$STAMP" ] || ! git cat-file -e "${STAMP}^{commit}" 2>/dev/null; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "ingen/ukjent TF-stamp ('$STAMP') → bygg for sikkerhets skyld"
            exit 0
          fi
          if [ -n "$(git rev-list "${STAMP}..HEAD" -- ios/ | head -1)" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "ios/ endret siden bygg (stamp $STAMP) → bygg"
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "ios/ uendret siden bygg (stamp $STAMP) → hopp over (gratis)"
          fi

  release:
    needs: detect
    if: needs.detect.outputs.should_build == 'true'
    runs-on: macos-26
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0 # record-testflight trenger ekte siste-ios/-commit

      - name: Velg nyeste Xcode 26
        run: |
          XCODE=$(ls -d /Applications/Xcode_26*.app | sort -V | tail -1)
          sudo xcode-select -s "$XCODE"
          xcodebuild -version

      - name: Installer XcodeGen
        run: brew install xcodegen

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Neste byggnummer fra App Store Connect
        id: build
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: node scripts/next-testflight-build.js

      - name: Legg API-nøkkelen der xcodebuild leter
        env:
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          printf '%s' "$ASC_PRIVATE_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

      - name: Generer prosjekt
        working-directory: ios
        run: xcodegen generate

      # WP-153: importer den FASTE CI-signeringsidentiteten i en midlertidig nøkkelring
      # FØR arkivering, så `-allowProvisioningUpdates` gjenbruker den i stedet for å minte
      # et nytt «Apple Development»-cert per kjøring. Det stopper cert-churn-en — og med den
      # «Your Certificate Has Been Revoked»-mailene prune-tilbakekallingene utløste. Secrets:
      # SIGNING_CERT_P12 (base64 av en .p12 = cert + privatnøkkel), SIGNING_CERT_PASSWORD.
      - name: Importer fast CI-signeringsidentitet i nøkkelringen
        env:
          P12_BASE64: ${{ secrets.SIGNING_CERT_P12 }}
          P12_PASSWORD: ${{ secrets.SIGNING_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/sportivista-signing.keychain-db"
          KEYCHAIN_PW="$(openssl rand -base64 24)"
          P12="$RUNNER_TEMP/ci-signing.p12"
          printf '%s' "$P12_BASE64" | base64 --decode > "$P12"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"   # hold ulåst under bygget
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security import "$P12" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          # la codesign/xcodebuild bruke nøkkelen uten interaktiv tillatelse
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          # legg CI-nøkkelringen FØRST i bruker-søkelista (behold de eksisterende)
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          rm -f "$P12"
          echo "Signeringsidentiteter i CI-nøkkelringen:"
          security find-identity -v -p codesigning "$KEYCHAIN"

      # Rydd FØR arkiveringen: cloud-signering på en fersk runner minter et nytt
      # «Apple Development»-cert per kjøring, som med auto-CD hoper seg opp til Apples
      # cert-tak og feller arkiveringen. Prune tilbakekaller de døde API-mintede certene
      # (beholder eierens navngitte + de nyeste par) FØR arkivering — så en cap-et konto
      # selv-heler i denne kjøringen. FAIL-SOFT: prune feller aldri bygget (exit 0).
      - name: Rydd gamle signeringssertifikater
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
          # WP-153: den FASTE CI-signeringsidentiteten (importert over) bærer også
          # displayName «Created via API» — beskytt den mot sin egen prune på ID, ellers
          # river prune bort identiteten den nettopp importerte. Sikkerhetsnett-modus:
          # rydder kun evt. gjenværende churn nå som mintingen skal ha stoppet.
          KEEP_CERT_IDS: T8J9GR47HS
        run: node scripts/prune-signing-certs.js

      # Arkiver + eksporter + last opp i ÉN selv-helende operasjon (WP-151): ASC
      # registrerer en fersk opplasting med treghet (eventual consistency), så to tette
      # kjøringer (auto-CD + en dispatch, eller to merges i en byge) kan hente SAMME
      # byggnummer i steget «Neste byggnummer» over → den andre feiler i eksport med
      # «The bundle version must be higher than the previously uploaded version: 'N'»
      # (exit 70). Orkestratoren fanger den feilen, bumper til N+1 og RE-ARKIVERER
      # (arkivet baker inn CFBundleVersion ved arkivering — manageAppVersionAndBuildNumber
      # er false — så nummeret MÅ settes på nytt der; re-eksport alene holder ikke) og
      # re-eksporterer, opptil TF_MAX_ATTEMPTS ganger med økende nummer. Det FAKTISK
      # opplastede nummeret skrives til $GITHUB_OUTPUT (build=) og brukes av «Registrer
      # opplastingen» under. Feiler HØYLYTT hvis alle forsøk er brukt opp (ekte problem,
      # ikke et race) — concurrency serialiserer kjøringene, men beskytter ikke mot ASCs
      # treghet, så retryen er selve fiksen. macOS er gratis på repoet ⇒ re-arkivering ok.
      - name: Arkiver + eksporter + last opp (selv-heler byggnummer-race)
        id: upload
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          TF_BUILD: ${{ steps.build.outputs.build }}
        run: |
          set -o pipefail
          cat > ios/export-options.plist <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store-connect</string>
            <key>destination</key><string>upload</string>
            <key>teamID</key><string>9LVCB72DT8</string>
            <key>signingStyle</key><string>automatic</string>
            <key>uploadSymbols</key><true/>
            <key>manageAppVersionAndBuildNumber</key><false/>
          </dict>
          </plist>
          EOF
          node scripts/testflight-upload.js

      - name: Registrer opplastingen (app-version-kontrakten)
        run: |
          # NB: byggnummeret her er det FAKTISK opplastede (steps.upload), ikke det
          # opprinnelig hentede (steps.build) — det kan ha blitt bumpet ved en
          # byggnummer-kollisjon i steget over. Recorden må matche det ASC faktisk fikk.
          VERSION=$(grep -m1 'MARKETING_VERSION' ios/project.yml | sed 's/[^0-9.]//g')
          node scripts/record-testflight.js "${{ steps.upload.outputs.build }}" "$VERSION"
          git config user.name "sportivista-release"
          git config user.email "actions@github.com"
          git add scripts/config/testflight.json
          git commit -m "testflight: registrer bygg $VERSION (${{ steps.upload.outputs.build }}) [via release-lanen]"
          # Samme rebase-retry som static-pipeline: en samtidig datacommit på
          # main skal ikke felle en ellers vellykket opplasting (bitt av
          # branch-protection-varianten 19.07 — bygget var oppe, recorden røk).
          pushed=""
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then pushed=1; break; fi
            echo "push avvist — rebaser mot main (forsøk $attempt)"
            git pull --rebase origin main || { git rebase --abort || true; }
          done
          [ -n "$pushed" ] || { echo "::error::fikk ikke pushet testflight-recorden etter 5 forsøk — kjør scripts/record-testflight.js ${{ steps.upload.outputs.build }} $VERSION lokalt"; exit 1; }

      - name: Kick den statiske pipelinen (publiser app-version.json)
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run static-pipeline.yml || echo "(pipeline-kick feilet — neste timekjøring tar den)"
