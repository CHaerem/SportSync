name: Scout agent

on:
  schedule:
    - cron: "40 5-21 * * *" # hourly during waking hours, offset from the static pipeline
  workflow_dispatch:

concurrency:
  group: sportsync-scout
  cancel-in-progress: false

jobs:
  scout:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      id-token: write
      actions: write # allows escalation via `gh workflow run research-agent.yml`
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model claude-haiku-4-5
            --max-turns 30
            --allowedTools "Read,Write,Edit,Glob,Grep,Bash(node:*),Bash(git:*),Bash(gh:*),Bash(date:*),Bash(jq:*)"
          prompt: |
            Read scripts/agents/scout.md and execute it. Be quick — this is an
            hourly triage pass, not a research run.
