# iOS-testgaten: Swift-unit-suiten (hostless bundles via Sportivista-skjemaet,
# inkl. golden-vektorene som pinner JS↔Swift bit-likt) på PR-er som rører ios/.
# Offentlig repo ⇒ macOS-runnere er gratis. Sekretløs: simulator-tester
# signerer ikke (CODE_SIGNING_ALLOWED=NO er prosjekt-default). UI-testene
# kjøres IKKE her (lokale/agent-drevne mot det deterministiske harnesset).
#
# Workflowen kjører på ALLE PR-er og hopper selv over macOS-jobben når ios/
# er urørt: branch-beskyttelsen krever sjekken «ios-tests», og en workflow
# med paths-filter rapporterer aldri på urelaterte PR-er (sjekken ville stått
# evig «expected»). En skippet jobb tilfredsstiller required checks.
name: iOS Tests

on:
  pull_request:
  push:
    branches: [main]
    paths:
      - "ios/**"
      - ".github/workflows/ios-tests.yml"

concurrency:
  group: ios-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      ios: ${{ steps.diff.outputs.ios }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Rører PR-en ios/?
        id: diff
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "ios=true" >> "$GITHUB_OUTPUT"   # push-triggeren er alt paths-filtrert
            exit 0
          fi
          BASE="${{ github.event.pull_request.base.sha }}"
          if git diff --name-only "$BASE"...HEAD | grep -qE '^(ios/|\.github/workflows/ios-tests\.yml)'; then
            echo "ios=true" >> "$GITHUB_OUTPUT"
          else
            echo "ios=false" >> "$GITHUB_OUTPUT"
            echo "Ingen ios/-endringer — macOS-jobben skippes (teller som grønn)."
          fi

  ios-tests:
    needs: detect
    if: needs.detect.outputs.ios == 'true'
    runs-on: macos-26
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v5

      - name: Velg nyeste Xcode 26
        run: |
          XCODE=$(ls -d /Applications/Xcode_26*.app | sort -V | tail -1)
          echo "Bruker $XCODE"
          sudo xcode-select -s "$XCODE"
          xcodebuild -version

      - name: Installer XcodeGen
        run: brew install xcodegen

      - name: Generer prosjekt
        working-directory: ios
        run: xcodegen generate

      - name: Finn simulator
        id: sim
        run: |
          DEVICE=$(xcrun simctl list devices available | grep -oE 'iPhone [^(]+' | head -1 | xargs)
          if [ -z "$DEVICE" ]; then echo "Ingen iPhone-simulator på imaget"; exit 1; fi
          echo "device=$DEVICE" >> "$GITHUB_OUTPUT"
          echo "Bruker simulator: $DEVICE"

      - name: Kjør Swift-testene
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild -project Sportivista.xcodeproj -scheme Sportivista \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.device }}" \
            -resultBundlePath TestResults.xcresult \
            test | grep -E "Test Suite|Executed|error:|BUILD|TEST" || true
          # Fasit hentes fra resultatbunten — greppet over er kun logg-støy-kutt.
          SUMMARY=$(xcrun xcresulttool get test-results summary --path TestResults.xcresult)
          echo "$SUMMARY" | grep -E '"result"|"passedTests"|"failedTests"'
          echo "$SUMMARY" | grep -q '"result" : "Passed"'
