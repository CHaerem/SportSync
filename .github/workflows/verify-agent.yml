name: Verify agent

on:
  schedule:
    - cron: "30 5 * * *" # 06:30/07:30 Oslo
  workflow_dispatch:

concurrency:
  group: sportsync-verify
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - run: npm ci
      - id: usage
        run: node scripts/usage-gate.js critical
        env:
          # WP-94-oppfølger: gate-steget kan nå hente FERSK kvote-avlesning
          # (usage-gate.js >10min-stien) i stedet for å stole på inntil 1t gammel
          # snapshot — tokenet er samme secret usage-monitor bruker, read-only kall.
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      - if: steps.usage.outputs.run == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model claude-opus-4-8
            --max-turns 80
            --allowedTools "Read,Write,Edit,Glob,Grep,WebFetch,WebSearch,Bash(node:*),Bash(git:*),Bash(date:*),Bash(jq:*)"
          prompt: |
            Read scripts/agents/verify.md and execute it.
            When done, commit your changes:
              git add docs/data/events.json docs/data/verify-log.json docs/data/calibration-ledger.jsonl .claude/skills/
              git commit -m "verify-agent: verify upcoming events"
              git push || (git pull --rebase origin main && git push)
