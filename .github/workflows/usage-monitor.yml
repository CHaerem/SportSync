name: Usage monitor

# The fuel gauge. Reads REAL Claude Code Max quota and writes
# docs/data/usage-state.json, which the scheduled agents gate on (skip / conserve
# when the budget runs low) and the dashboard surfaces.
#
# There is NO supported quota API for a Max OAuth token (/usage is TUI-only; the
# Usage/Cost Admin API needs an org admin key; the token is inference-scoped).
# BUT a minimal /v1/messages call with CLAUDE_CODE_OAUTH_TOKEN returns the
# account-wide `anthropic-ratelimit-unified-*` headers (5h + 7d utilization,
# reset timestamps, allowed/allowed_warning/rejected status) — verified in CI and
# matching what `/usage` shows locally. scripts/check-usage.js makes that call.

on:
  schedule:
    - cron: "20 5-22 * * *" # hourly during active hours, offset from other jobs
  workflow_dispatch:

concurrency:
  group: sportsync-usage-monitor
  cancel-in-progress: false

jobs:
  usage-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: Read quota → usage-state.json
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          node scripts/check-usage.js
          node scripts/update-readme-status.js
      - name: Commit usage-state.json + README status
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add docs/data/usage-state.json docs/data/usage-history.jsonl docs/data/usage-summary.json README.md 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "usage-monitor: refresh quota state"
            git push || (git pull --rebase -X theirs origin ${{ github.ref_name }} && git push)
          else
            echo "usage-state.json unchanged — nothing to commit"
          fi
