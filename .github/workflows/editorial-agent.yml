name: Editorial agent

on:
  schedule:
    - cron: "0 5 * * *"  # 07:00 Oslo (CEST) — morning brief
    - cron: "0 15 * * *" # 17:00 Oslo (CEST) — evening brief
  workflow_dispatch:
    inputs:
      mode:
        description: "Editorial mode"
        type: choice
        options: [morning, evening]
        default: morning

concurrency:
  group: sportsync-editorial
  cancel-in-progress: false

jobs:
  editorial:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - run: npm ci
      - name: Determine mode
        id: mode
        run: |
          if [ -n "${{ inputs.mode }}" ]; then
            echo "mode=${{ inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ "$(date -u +%-H)" -lt 10 ]; then
            echo "mode=morning" >> $GITHUB_OUTPUT
          else
            echo "mode=evening" >> $GITHUB_OUTPUT
          fi
      - id: usage
        run: node scripts/usage-gate.js optional
        env:
          # WP-94-oppfølger: gate-steget kan nå hente FERSK kvote-avlesning
          # (usage-gate.js >10min-stien) i stedet for å stole på inntil 1t gammel
          # snapshot — tokenet er samme secret usage-monitor bruker, read-only kall.
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }} # editorial is a nice-to-have — skip it first under quota pressure
      - if: steps.usage.outputs.run == 'true'
        uses: anthropics/claude-code-action@v1
        env:
          SPORTSYNC_EDITORIAL_MODE: ${{ steps.mode.outputs.mode }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model claude-opus-4-8
            --max-turns 60
            --allowedTools "Read,Write,Edit,Glob,Grep,Bash(node:*),Bash(git:*),Bash(date:*),Bash(jq:*)"
          prompt: |
            Read scripts/agents/editorial.md and execute it with mode=${{ steps.mode.outputs.mode }}.
            When done, commit your changes:
              git add docs/data/featured.json
              git commit -m "editorial-agent (${{ steps.mode.outputs.mode }}): update brief"
              git push || (git pull --rebase origin main && git push)
