<!DOCTYPE html>
<html lang="nb">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
	<meta name="description" content="En rolig oversikt over sporten du følger — når det skjer og hvor du ser det.">
	<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
	<meta name="theme-color" content="#F2F2F7" media="(prefers-color-scheme: light)">
	<link rel="manifest" href="manifest.webmanifest">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
	<meta name="apple-mobile-web-app-title" content="Sportivista">
	<link rel="apple-touch-icon" href="icons/icon-180x180.png">
	<link rel="icon" type="image/png" href="favicon.png">
	<title>Sportivista</title>
	<!-- Apply the chosen theme before paint (no flash of wrong theme); js/theme.js owns the toggle. -->
	<script>try { var t = localStorage.getItem('ss-theme'); if (t === 'dark' || t === 'light') document.documentElement.dataset.theme = t; } catch (e) {}</script>
	<link rel="stylesheet" href="css/base.css">
	<link rel="stylesheet" href="css/layout.css">
	<link rel="stylesheet" href="css/cards.css">
</head>
<body>
	<header class="masthead">
		<div class="wrap masthead-inner">
			<div class="mast-row mast-row-top">
				<span class="wordmark-lockup"><span class="wordmark">Sportivista</span><span class="wordmark-colon" aria-hidden="true">:</span></span>
				<button class="theme-toggle" id="theme-toggle" title="Bytt tema (system / mørk / lys)" aria-label="Bytt tema">◐</button>
			</div>
			<div class="mast-row mast-row-sub">
				<p class="mast-date"><span id="hero-date"></span></p>
			</div>
		</div>
	</header>

	<main class="wrap">
		<section class="hero" id="hero">
			<h1 class="hero-headline" id="hero-headline"></h1>
		</section>
		<p class="install-hint" id="install-hint" hidden></p>
		<div class="live-now" id="live-now" hidden></div>
		<section class="next-up" id="next-up" hidden></section>
		<div id="agenda"></div>
		<details class="fremover" id="fremover" hidden></details>
		<details class="followed" id="followed" hidden>
			<summary id="followed-summary"><span>Dette dekker vi</span><a class="followed-edit-top" href="rediger.html" onclick="event.stopPropagation()">Be om dekning</a></summary>
			<div class="followed-body" id="followed-body"></div>
		</details>
	</main>

	<footer class="site-footer wrap">
		<span id="footer-updated"></span>
		<a href="webcal://sportivista.com/data/events.ics" title="Abonner — native påminnelser på mobil før varsel-eventene (ett trykk på iOS/Android)">Abonner i kalender</a>
		<a href="data/events.ics" download class="footer-alt" title="Last ned .ics (engangsimport, f.eks. på desktop)">last ned</a>
		<a href="activity.html" class="footer-alt" title="Hva automatikken har gjort — forbedringer og endringer">Aktivitet</a>
		<a id="app-promo-link" class="footer-alt footer-app" href="#" hidden title="Sportivista som iPhone-app — varsler, widget og assistent på lomma">Få iPhone-appen</a>
		<span id="footer-stale" class="footer-stale" hidden></span>
		<span id="footer-usage" class="footer-usage" hidden></span>
	</footer>

	<script src="js/shared-constants.js"></script>
	<script src="js/lens.js"></script>
	<script src="js/profile-sync.js"></script>
	<script src="js/theme.js"></script>
	<script src="js/dashboard.js"></script>
	<script src="js/live.js"></script>
	<script src="js/detail.js"></script>
	<script src="js/followed.js"></script>
	<script src="js/profile-ui.js"></script>
	<script src="js/chrome.js"></script>
	<script>
		if ('serviceWorker' in navigator) {
			window.addEventListener('load', () => {
				navigator.serviceWorker.register('sw.js').then((reg) => {
					reg.update();
					// Re-check for a new version when the app returns to the foreground
					// (iOS home-screen PWAs resume without reloading).
					document.addEventListener('visibilitychange', () => {
						if (!document.hidden) reg.update();
					});
				}).catch(() => {});
				// If the page was already controlled, reload once when a new worker
				// takes over so a shipped update lands without a manual refresh.
				if (navigator.serviceWorker.controller) {
					let reloaded = false;
					navigator.serviceWorker.addEventListener('controllerchange', () => {
						if (reloaded) return;
						reloaded = true;
						window.location.reload();
					});
				}
			});
		}
	</script>
</body>
</html>
