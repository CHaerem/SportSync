<!DOCTYPE html>
<html lang="nb">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
	<meta name="description" content="En rolig oversikt over sporten du følger — når det skjer og hvor du ser det.">
	<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
	<meta name="theme-color" content="#F2F2F7" media="(prefers-color-scheme: light)">
	<link rel="manifest" href="manifest.webmanifest">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
	<meta name="apple-mobile-web-app-title" content="Sportivista">
	<link rel="apple-touch-icon" href="icons/icon-180x180.png">
	<link rel="icon" type="image/png" href="favicon.png">
	<title>Sportivista</title>
	<!-- Apply the chosen theme before paint (no flash of wrong theme); js/theme.js owns the toggle. -->
	<script>try { var t = localStorage.getItem('ss-theme'); if (t === 'dark' || t === 'light') document.documentElement.dataset.theme = t; } catch (e) {}</script>
	<link rel="stylesheet" href="css/base.css">
	<link rel="stylesheet" href="css/layout.css">
	<link rel="stylesheet" href="css/cards.css">
</head>
<body class="gated">
	<!-- Whole-web-behind-login (eier-beslutning 21.07): nothing renders until Sign
	     in with Apple. `body.gated` hides the content (base.css); auth-gate reveals
	     it after sign-in. A missing token / failed CloudKit load shows a calm error
	     here, never a blank page. -->
	<div id="auth-gate" class="auth-gate">
		<div class="auth-gate-inner">
			<span class="wordmark-lockup"><span class="wordmark">Sportivista</span><span class="wordmark-colon" aria-hidden="true">:</span></span>
			<p class="auth-gate-lead">Din personlige sportsoversikt. Logg inn med Apple for å se det du følger — synket med iPhone-appen via din egen iCloud.</p>
			<!-- Apple's own Sign in with Apple control (Apple-sanctioned styling).
			     CloudKit JS renders the button in here; we show it as-is rather than
			     skinning our own Apple-branded button over it — that keeps us clear of
			     both the click-forwarding race (double-tap) and Apple's button-styling
			     guidelines. -->
			<div id="apple-sign-in-button"></div>
			<p class="auth-error" id="auth-error" hidden></p>
		</div>
	</div>
	<header class="masthead">
		<div class="wrap masthead-inner">
			<div class="mast-row mast-row-top">
				<!-- Merkelåsen som ÉN tilgjengelighets-enhet med ÉN etikett (BRAND.md
				     regel 4). WP-180: etiketten oppdateres av `renderMastheadLive` når
				     kolonet bærer live-signalet («Sportivista — sender nå, N direkte»),
				     nøyaktig som iOS' `mastheadLabel`. -->
				<span class="wordmark-lockup" id="masthead-lockup" role="img" aria-label="Sportivista"><span class="wordmark">Sportivista</span><span class="wordmark-colon" aria-hidden="true">:</span></span>
				<button class="theme-toggle" id="theme-toggle" title="Bytt tema (system / mørk / lys)" aria-label="Bytt tema">◐</button>
			</div>
			<div class="mast-row mast-row-sub">
				<p class="mast-date"><span id="hero-date"></span></p>
			</div>
		</div>
	</header>

	<main class="wrap">
		<section class="hero" id="hero">
			<h1 class="hero-headline" id="hero-headline"></h1>
		</section>
		<p class="install-hint" id="install-hint" hidden></p>
		<!-- Root segmented (app-parity, WP-154): «Uka» (what's happening — the agenda)
		     vs «Nyheter» (what's new — the four-section news board). Mirrors the iOS
		     ContentView segmented control. Both cover the whole week. -->
		<div class="root-tabs" role="tablist" aria-label="Visning">
			<button type="button" class="root-tab is-active" data-view="uka" role="tab" aria-selected="true">Uka</button>
			<button type="button" class="root-tab" data-view="nyheter" role="tab" aria-selected="false">Nyheter</button>
		</div>
		<div id="view-uka" class="root-view" role="tabpanel">
			<div class="live-now" id="live-now" hidden></div>
			<div id="agenda"></div>
			<!-- "Neste opp" sits UNDER the agenda (WP-148): a per-entity forward glance is a
			     nice-to-have, but rendering it ABOVE the day-grouped agenda buried «I dag»
			     under rows for events 8–14 days out — inverting «viktig + nært først». It
			     keeps its nearest-first dedupe against what's already on the board; below
			     the agenda it complements «Fremover»/«Dette dekker vi» instead of competing
			     with today. (renderAgenda still runs before renderNextUp, so the dedupe set
			     is populated regardless of DOM order.) -->
			<section class="next-up" id="next-up" hidden></section>
			<details class="followed" id="followed" hidden>
				<summary id="followed-summary"><span>Dette dekker vi</span><a class="followed-edit-top" href="rediger.html" onclick="event.stopPropagation()">Be om dekning</a></summary>
				<!-- Søk-og-følg (WP-163): the vanilla-user path to follow something that
				     isn't on the board. Searches entities.json (name + aliases); a tap
				     follows directly (ssProfileFollow) with a calm confirmation. Wired
				     once by profile-ui.js bindFollowSearch (survives re-render). -->
				<div class="follow-search" id="follow-search">
					<input type="search" id="follow-search-input" class="follow-search-input" placeholder="Søk og følg et lag eller en utøver…" autocomplete="off" autocapitalize="off">
					<div class="follow-search-results" id="follow-search-results" hidden></div>
				</div>
				<div class="followed-body" id="followed-body"></div>
			</details>
		</div>
		<div id="view-nyheter" class="root-view" role="tabpanel" hidden>
			<!-- The four-section Nyheter board (twin of iOS NewsBoard/NewsView): NYTT
			     (news.json pointers, lens-matched) · RESULTAT (followed teams' results)
			     · FREMOVER (forvarsler beyond 14 d). The editorial headline stays the
			     quiet hero line above, so its «I din verden i dag» section isn't repeated. -->
			<div id="nyheter"></div>
			<details class="fremover" id="fremover" hidden></details>
		</div>
	</main>

	<!-- Assistent-inngang (app-parity, WP-154): a compact floating bottom-trailing
	     button — sparkles + «Assistent» — that reads unmistakably as a button (never a
	     dead field), collapsing to the bare glyph while the board scrolls (mirrors the
	     iOS AssistantButton). Tapping it opens the conversation sheet below, where the
	     input, example rows and grounded results live (mirrors AssistantSheetView). -->
	<button type="button" id="assistant-fab" class="assistant-fab" aria-haspopup="dialog" aria-label="Assistent">
		<svg class="fab-glyph" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2.6l1.7 4.5L18 8.8l-4.3 1.7L12 15l-1.7-4.5L6 8.8l4.3-1.7L12 2.6zm6.5 9.4l.9 2.4 2.4.9-2.4.9-.9 2.4-.9-2.4-2.4-.9 2.4-.9.9-2.4zM6 13.5l.7 1.8 1.8.7-1.8.7L6 18.5l-.7-1.8L3.5 16l1.8-.7L6 13.5z"/></svg>
		<span class="fab-label">Assistent</span>
	</button>
	<div id="assistant-sheet" class="assistant-sheet" hidden role="dialog" aria-modal="true" aria-label="Assistent">
		<div class="sheet-backdrop" data-assistant-close></div>
		<div class="sheet-panel">
			<div class="sheet-grabber" aria-hidden="true"></div>
			<div class="sheet-head">
				<span class="sheet-title">Assistent</span>
				<button type="button" class="sheet-close" data-assistant-close aria-label="Lukk">Lukk</button>
			</div>
			<input type="text" id="assistant-input" class="assistant-input" autocomplete="off" enterkeyhint="search" placeholder="Spør om det du følger …">
			<div class="assistant-examples" id="assistant-examples">
				<p class="ex-lead">Prøv for eksempel</p>
				<button type="button" class="ex-row" data-ex="hva skjer i kveld?">hva skjer i kveld?</button>
				<button type="button" class="ex-row" data-ex="vis golf denne uka">vis golf denne uka</button>
				<button type="button" class="ex-row" data-ex="når spiller Liverpool?">når spiller Liverpool?</button>
			</div>
			<div class="assistant-results" id="assistant-results" hidden></div>
		</div>
	</div>

	<footer class="site-footer wrap">
		<span id="footer-updated"></span>
		<a href="webcal://sportivista.com/data/events.ics" title="Abonner — native påminnelser på mobil før varsel-eventene (ett trykk på iOS/Android)">Abonner i kalender</a>
		<a href="data/events.ics" download class="footer-alt" title="Last ned .ics (engangsimport, f.eks. på desktop)">last ned</a>
		<a href="activity.html" class="footer-alt" title="Hva automatikken har gjort — forbedringer og endringer">Aktivitet</a>
		<a id="app-promo-link" class="footer-alt footer-app" href="#" hidden title="Sportivista som iPhone-app — varsler, widget og assistent på lomma">Få iPhone-appen</a>
		<span id="footer-stale" class="footer-stale" hidden></span>
		<span id="footer-usage" class="footer-usage" hidden></span>
		<!-- CloudKit renders its own (inconsistent) sign-out control into
		     #apple-sign-out-button; we hide it off-screen and drive our own calm
		     footer link (shown only when signed in). Same pattern as sign-in. -->
		<span id="apple-sign-out-button" aria-hidden="true"></span>
		<button type="button" id="signout-link" class="footer-alt footer-signout-link" hidden>Logg ut</button>
	</footer>

	<script src="js/icloud-config.js"></script>
	<script src="https://cdn.apple-cloudkit.com/ck/2/cloudkit.js" async></script>
	<script src="js/icloud-sync.js"></script>
	<script src="js/shared-constants.js"></script>
	<script src="js/lens.js"></script>
	<script src="js/profile-sync.js"></script>
	<script src="js/assistant.js"></script>
	<script src="js/sport-icons.js"></script>
	<script src="js/entity-avatar.js"></script>
	<script src="js/theme.js"></script>
	<script src="js/dashboard.js"></script>
	<script src="js/live.js"></script>
	<script src="js/detail.js"></script>
	<script src="js/followed.js"></script>
	<script src="js/profile-ui.js"></script>
	<script src="js/news-web.js"></script>
	<script src="js/chrome.js"></script>
	<script>
		// Whole-web-behind-login boot: dashboard.js's DOMContentLoaded calls
		// window.ssBootGate(dashboard) when present (else inits directly — dev/test).
		// Here we wait for the async CloudKit JS, then hand off to the auth gate;
		// the board's init() runs only AFTER a successful Apple sign-in.
		window.ssBootGate = function (dashboard) {
			const tokenSet = window.SPORTIVISTA_ICLOUD && window.SPORTIVISTA_ICLOUD.apiToken;
			if (!window.ssICloud || typeof ssICloud.gate !== 'function' || !tokenSet) {
				dashboard.init(); // no gate configured → open (local dev / stripped build)
				return;
			}
			let tries = 0;
			const t = setInterval(() => {
				const ready = typeof CloudKit !== 'undefined';
				if (ready || ++tries > 40) { // ~10s, then gate shows the CloudKit-missing error
					clearInterval(t);
					ssICloud.gate({
						onAuthed: () => dashboard.init(),
						// A foreground re-sync may have merged a phone change → re-render
						// the board from the freshly-synced local profile.
						onResync: () => {
							if (typeof dashboard.applyProfile === 'function' && typeof ssProfileLoad === 'function') {
								dashboard.applyProfile(ssProfileLoad());
								dashboard.render();
							}
						},
					});
				}
			}, 250);
		};
		if ('serviceWorker' in navigator) {
			window.addEventListener('load', () => {
				navigator.serviceWorker.register('sw.js').then((reg) => {
					reg.update();
					// Re-check for a new version when the app returns to the foreground
					// (iOS home-screen PWAs resume without reloading).
					document.addEventListener('visibilitychange', () => {
						if (!document.hidden) reg.update();
					});
				}).catch(() => {});
				// If the page was already controlled, reload once when a new worker
				// takes over so a shipped update lands without a manual refresh.
				if (navigator.serviceWorker.controller) {
					let reloaded = false;
					navigator.serviceWorker.addEventListener('controllerchange', () => {
						if (reloaded) return;
						reloaded = true;
						window.location.reload();
					});
				}
			});
		}
	</script>
</body>
</html>
