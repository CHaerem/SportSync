<!DOCTYPE html>
<html lang="nb">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
	<meta name="description" content="En rolig oversikt over sporten du følger — når det skjer og hvor du ser det.">
	<meta name="theme-color" content="#0c0e11" media="(prefers-color-scheme: dark)">
	<meta name="theme-color" content="#f6f3ec" media="(prefers-color-scheme: light)">
	<link rel="manifest" href="manifest.webmanifest">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
	<meta name="apple-mobile-web-app-title" content="SportSync">
	<link rel="apple-touch-icon" href="icons/icon-180x180.png">
	<link rel="icon" type="image/png" href="favicon.png">
	<title>SportSync</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="css/base.css">
	<link rel="stylesheet" href="css/layout.css">
	<link rel="stylesheet" href="css/cards.css">
</head>
<body>
	<header class="masthead">
		<div class="wrap masthead-inner">
			<span class="wordmark">SportSync</span>
			<span class="masthead-clock" id="masthead-clock" aria-hidden="true"></span>
			<button class="theme-toggle" id="theme-toggle" title="Bytt tema" aria-label="Bytt tema">◐</button>
		</div>
	</header>

	<main class="wrap">
		<section class="hero" id="hero">
			<p class="hero-eyebrow" id="hero-date"></p>
			<h1 class="hero-headline" id="hero-headline"></h1>
		</section>
		<div class="live-now" id="live-now" hidden></div>
		<div id="agenda"></div>
		<details class="followed" id="followed" hidden>
			<summary id="followed-summary"><span>Hva vi følger</span><a class="followed-edit-top" href="https://github.dev/CHaerem/SportSync/blob/main/scripts/config/interests.json" target="_blank" rel="noopener" onclick="event.stopPropagation()">✎ Rediger</a></summary>
			<div class="followed-body" id="followed-body"></div>
		</details>
	</main>

	<footer class="site-footer wrap">
		<span id="footer-updated"></span>
		<a href="data/events.ics" download title="Alt du følger — med påminnelse før 🔔-eventene">Legg til i kalender</a>
		<span id="footer-stale" class="footer-stale" hidden></span>
		<span id="footer-usage" class="footer-usage" hidden></span>
	</footer>

	<script src="js/shared-constants.js"></script>
	<script src="js/sport-config.js"></script>
	<script src="js/asset-maps.js"></script>
	<script src="js/dashboard.js"></script>
	<script>
		if ('serviceWorker' in navigator) {
			window.addEventListener('load', () => {
				navigator.serviceWorker.register('sw.js').catch(() => {});
			});
		}
	</script>
</body>
</html>
